name: The Bash — Daily AI News

on:
  schedule:
    # Every 6 hours ET: 6 AM, 12 PM, 6 PM, 12 AM
    # During EDT (March-October, UTC-4):
    - cron: '0 10 * * *'  # 6 AM EDT = 10 AM UTC
    - cron: '0 16 * * *'  # 12 PM EDT = 4 PM UTC
    - cron: '0 22 * * *'  # 6 PM EDT = 10 PM UTC
    - cron: '0 4 * * *'   # 12 AM EDT = 4 AM UTC
    # Note: During EST (November-February, UTC-5), adjust times to:
    # - cron: '0 11 * * *'  # 6 AM EST = 11 AM UTC
    # - cron: '0 17 * * *'  # 12 PM EST = 5 PM UTC
    # - cron: '0 23 * * *'  # 6 PM EST = 11 PM UTC
    # - cron: '0 5 * * *'   # 12 AM EST = 5 AM UTC
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate The Bash AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_news.py

      - name: Commit and push news
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news/
          git diff --cached --quiet || git commit -m "news: The Bash digest for $(date +%Y-%m-%d)"
          git push
