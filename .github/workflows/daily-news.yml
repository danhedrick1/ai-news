name: Daily AI News

on:
  schedule:
    # 6:00 AM UTC daily (adjust timezone offset as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate AI news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_news.py

      - name: Commit and push news
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news/
          git diff --cached --quiet || git commit -m "news: add AI digest for $(date +%Y-%m-%d)"
          git push
