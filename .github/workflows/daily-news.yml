name: "theba.sh — Daily Digest"

on:
  schedule:
    # Every 6 hours ET: 6 AM, 12 PM, 6 PM, 12 AM
    # Fixed UTC times; actual ET time depends on DST offset (handled in script via TZ env var)
    - cron: '0 10 * * *'  # 10 AM UTC (6 AM EDT / 5 AM EST)
    - cron: '0 16 * * *'  # 4 PM UTC (12 PM EDT / 11 AM EST)
    - cron: '0 22 * * *'  # 10 PM UTC (6 PM EDT / 5 PM EST)
    - cron: '0 4 * * *'   # 4 AM UTC (12 AM EDT / 11 PM EST previous day)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date to generate in YYYY-MM-DD format"
        required: false
        type: string

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Preflight environment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python --version
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Anthropic key detected."
          else
            echo "Anthropic key missing. Generator will publish fallback digest output."
          fi

      - name: Generate theba.sh AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python generate_news.py "$TARGET_DATE"
          else
            # Pass today's date in ET timezone (not UTC from GitHub Actions runner)
            ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
            python generate_news.py "$ET_DATE"
          fi

      - name: Generate weekly recap on Sundays in New York
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(TZ=America/New_York date +%u)" = "7" ]; then
            python generate_news.py --weekly
          else
            echo "Skipping weekly recap outside Sunday ET."
          fi

      - name: Commit and push news
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news/ feed.xml sitemap.xml robots.txt
          git diff --cached --quiet || git commit -m "theba.sh: digest for $(date +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main
          git push origin main
