name: "theba.sh — Daily Digest"

on:
  schedule:
    # Every 6 hours ET: 6 AM, 12 PM, 6 PM, 12 AM
    # During EDT (March-October, UTC-4):
    - cron: '0 10 * * *'  # 6 AM EDT = 10 AM UTC
    - cron: '0 16 * * *'  # 12 PM EDT = 4 PM UTC
    - cron: '0 22 * * *'  # 6 PM EDT = 10 PM UTC
    - cron: '0 4 * * *'   # 12 AM EDT = 4 AM UTC
    # Note: During EST (November-February, UTC-5), adjust times to:
    # - cron: '0 11 * * *'  # 6 AM EST = 11 AM UTC
    # - cron: '0 17 * * *'  # 12 PM EST = 5 PM UTC
    # - cron: '0 23 * * *'  # 6 PM EST = 11 PM UTC
    # - cron: '0 5 * * *'   # 12 AM EST = 5 AM UTC
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional date to generate in YYYY-MM-DD format"
        required: false
        type: string

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Preflight environment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python --version
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Anthropic key detected."
          else
            echo "Anthropic key missing. Generator will publish fallback digest output."
          fi

      - name: Generate theba.sh AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python generate_news.py "$TARGET_DATE"
          else
            python generate_news.py
          fi

      - name: Generate weekly recap on Sundays in New York
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(TZ=America/New_York date +%u)" = "7" ]; then
            python generate_news.py --weekly
          else
            echo "Skipping weekly recap outside Sunday ET."
          fi

      - name: Commit and push news
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@users.noreply.github.com"
          git add news/ feed.xml sitemap.xml robots.txt
          git diff --cached --quiet || git commit -m "theba.sh: digest for $(date +%Y-%m-%d)"
          git push
