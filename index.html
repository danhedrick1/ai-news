<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News Daily</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --sidebar-bg: #161b22;
      --card-bg: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --tag-bg: #1f3a5f;
      --tag-text: #79b8ff;
      --header-height: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .logo span { color: var(--accent); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .live-badge {
      background: rgba(46,160,67,0.15);
      color: #3fb950;
      border: 1px solid rgba(46,160,67,0.4);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
    }

    /* ── SIDEBAR ── */
    aside {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto;
    }

    aside h2 {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .date-item:hover { background: rgba(88,166,255,0.05); }
    .date-item.active {
      background: rgba(88,166,255,0.1);
      border-left-color: var(--accent);
    }
    .date-item .date-label {
      font-size: 0.85rem;
      color: var(--text);
    }
    .date-item .date-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .date-item.active .date-label { color: var(--accent); }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      padding: 36px 48px;
      max-width: 860px;
    }

    #loading, #error-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 300px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MARKDOWN STYLES ── */
    #content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    #content h1 + p em {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: normal;
    }

    #content h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #content h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    #content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin: 24px 0 10px;
    }

    #content p {
      color: #cdd9e5;
      line-height: 1.75;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    #content ul, #content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }
    #content li {
      color: #cdd9e5;
      line-height: 1.7;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    #content li::marker { color: var(--accent); }

    #content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(88,166,255,0.3);
      transition: border-color 0.15s;
    }
    #content a:hover { border-color: var(--accent); }

    #content strong { color: var(--text); font-weight: 600; }
    #content em { color: var(--text-muted); }

    #content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: rgba(88,166,255,0.05);
      border-radius: 0 6px 6px 0;
      margin: 16px 0;
    }
    #content blockquote p { margin: 0; color: var(--text-muted); font-style: italic; }

    #content code {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.85em;
      color: #f0883e;
    }

    #content pre {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    #content pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e6edf3;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── DATE HEADER ── */
    .news-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .news-meta .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      aside { display: none; }
      main { padding: 24px 20px; }
      #content h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot"></div>
    AI<span>News</span>
  </div>
  <div class="header-right">
    <div class="live-badge">DAILY</div>
    <button id="refresh-btn" onclick="loadIndex()">⟳ Refresh</button>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>Archive</h2>
    <div id="date-list"></div>
  </aside>

  <main>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading latest news…</span>
    </div>
    <div id="error-msg" style="display:none">
      <span style="font-size:2rem">⚠️</span>
      <span id="error-text">Failed to load news.</span>
    </div>
    <div id="content" style="display:none"></div>
  </main>
</div>

<script>
  let currentDate = null;

  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  function relativeDay(iso) {
    const today = new Date().toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if (iso === today) return 'Today';
    if (iso === yesterday) return 'Yesterday';
    return '';
  }

  async function loadIndex() {
    try {
      const res = await fetch(`news/index.json?t=${Date.now()}`);
      if (!res.ok) throw new Error('index not found');
      const data = await res.json();
      const dates = data.dates || [];

      const list = document.getElementById('date-list');
      list.innerHTML = '';

      if (dates.length === 0) {
        list.innerHTML = '<div style="padding:12px 16px;color:var(--text-muted);font-size:0.82rem">No issues yet.</div>';
        showEmpty();
        return;
      }

      dates.forEach(d => {
        const item = document.createElement('div');
        item.className = 'date-item' + (d === currentDate ? ' active' : '');
        item.dataset.date = d;
        const rel = relativeDay(d);
        item.innerHTML = `
          <div>
            <div class="date-label">${formatDate(d)}</div>
          </div>
          ${rel ? `<div class="date-sub">${rel}</div>` : ''}
        `;
        item.addEventListener('click', () => loadNews(d));
        list.appendChild(item);
      });

      if (!currentDate && dates.length > 0) {
        loadNews(dates[0]);
      }
    } catch (e) {
      showError('Could not load news index. Has the first issue been generated yet?');
    }
  }

  async function loadNews(dateStr) {
    currentDate = dateStr;

    // Update sidebar active state
    document.querySelectorAll('.date-item').forEach(el => {
      el.classList.toggle('active', el.dataset.date === dateStr);
    });

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    try {
      const res = await fetch(`news/${dateStr}.md?t=${Date.now()}`);
      if (!res.ok) throw new Error('not found');
      const md = await res.text();
      const html = marked.parse(md);

      const contentEl = document.getElementById('content');
      contentEl.innerHTML = html;
      contentEl.style.display = 'block';
      document.getElementById('loading').style.display = 'none';

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      showError(`Could not load news for ${formatDate(dateStr)}.`);
    }
  }

  function showEmpty() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">📰</div>
        <h3>No issues yet</h3>
        <p>Run <code>generate_news.py</code> to create the first issue.</p>
      </div>
    `;
    document.getElementById('content').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').style.display = 'flex';
  }

  loadIndex();
</script>
</body>
</html>
