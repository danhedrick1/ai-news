<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bash — AI & Dev News</title>
  <meta name="description" content="The Bash — high-signal AI and dev news, ranked by impact. Updated every 6 hours." />
  <meta property="og:title" content="The Bash — AI & Dev News" />
  <meta property="og:description" content="High-signal AI and dev news for developers and researchers. Updated every 6 hours." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://thebash.dev" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Bash — AI & Dev News" />
  <meta name="twitter:description" content="High-signal AI and dev news for developers and researchers." />
  <link rel="canonical" href="https://thebash.dev" />
  <link rel="alternate" type="application/rss+xml" title="The Bash RSS" href="/feed.xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="dark"] {
      --bg: #0a0e14;
      --sidebar-bg: #0f1419;
      --card-bg: #151b23;
      --border: #1e2a35;
      --text: #e6edf3;
      --text-muted: #7a8a9e;
      --accent: #39d353;
      --accent-hover: #56e06e;
      --accent-glow: rgba(57,211,83,0.15);
      --link: #58a6ff;
      --link-hover: #79b8ff;
      --tag-bg: #0d2818;
      --tag-text: #56e06e;
      --header-height: 56px;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --paywall: #d29922;
      --paywall-bg: rgba(210,153,34,0.1);
      --code-color: #f0883e;
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #1a7f37;
      --accent-hover: #2da44e;
      --accent-glow: rgba(26,127,55,0.1);
      --link: #0969da;
      --link-hover: #0550ae;
      --tag-bg: #dafbe1;
      --tag-text: #1a7f37;
      --paywall: #9a6700;
      --paywall-bg: rgba(154,103,0,0.1);
      --code-color: #cf222e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: var(--sidebar-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .logo .prompt {
      color: var(--accent);
      margin-right: 6px;
      font-weight: 400;
      text-shadow: 0 0 12px var(--accent-glow);
    }
    .logo .name { color: var(--accent); }
    .logo .tagline {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 12px;
      letter-spacing: 0.5px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
    }
    .header-btn:hover { border-color: var(--accent); color: var(--accent); }

    #subscribe-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--bg);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }
    #subscribe-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .last-update-badge {
      color: var(--text-muted);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .archive-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 220px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .archive-dropdown .date-item { padding: 10px 16px; border-left: none; border-radius: 0; }
    .archive-dropdown .date-item:hover { background: var(--accent-glow); }
    .archive-dropdown .date-item.active {
      background: var(--accent-glow);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .archive-dropdown .date-item .date-sub {
      display: block;
      font-size: 0.65rem;
      margin-left: 0;
      margin-top: 2px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
    }

    /* ── SIDEBAR ── */
    aside {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto;
    }

    aside h2 {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .date-item:hover { background: var(--accent-glow); }
    .date-item.active {
      background: var(--accent-glow);
      border-left-color: var(--accent);
    }
    .date-item .date-label { font-size: 0.85rem; color: var(--text); }
    .date-item .date-sub { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; }
    .date-item.active .date-label { color: var(--accent); }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      padding: 36px 48px;
      max-width: 860px;
    }

    #loading, #error-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 300px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MARKDOWN STYLES ── */
    #content h1 {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.25;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    #content h1 + p em {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: normal;
    }

    #content h2 {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #content h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    #content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin: 24px 0 10px;
    }

    #content p {
      color: var(--text);
      opacity: 0.9;
      line-height: 1.75;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    #content ul, #content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }
    #content li {
      color: var(--text);
      opacity: 0.9;
      line-height: 1.7;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    #content li::marker { color: var(--accent); }

    #content a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    #content a:hover { border-color: var(--link); }

    #content strong { color: var(--text); font-weight: 600; }
    #content em { color: var(--text-muted); }

    #content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: var(--accent-glow);
      border-radius: 0 6px 6px 0;
      margin: 16px 0;
    }
    #content blockquote p { margin: 0; color: var(--text-muted); font-style: italic; }

    #content code {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--code-color);
    }

    #content pre {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    #content pre code { background: none; border: none; padding: 0; color: var(--text); }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── READING TIME ── */
    .reading-time {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
    }

    /* ── DATE HEADER ── */
    .news-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .news-meta .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      font-family: var(--font-mono);
    }

    /* ── COLLAPSIBLE STORIES ── */
    #content h3.story-toggle {
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    #content h3.story-toggle:hover { color: var(--accent); }
    #content h3.story-toggle:hover .story-chevron { color: var(--accent); }

    .story-chevron {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-right: 6px;
      transition: color 0.15s;
    }

    .story-body {
      display: none;
      padding: 6px 0 16px 22px;
      border-left: 2px solid var(--border);
      margin: 2px 0 8px 5px;
    }
    .story-body.open {
      display: block;
      animation: storyFadeIn 0.15s ease;
    }
    @keyframes storyFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SHARE BUTTONS ── */
    .share-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .share-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── PAYWALL BADGE ── */
    .paywall-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--paywall);
      background: var(--paywall-bg);
      border: 1px solid color-mix(in srgb, var(--paywall) 35%, transparent);
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; font-family: var(--font-mono); }
    .empty-state p { font-size: 0.9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      aside { display: none; }
      main { padding: 24px 20px; }
      #content h1 { font-size: 1.4rem; }
      .logo .tagline { display: none; }
      .header-right { gap: 6px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="prompt">&gt;_</span>
    <span class="name">The Bash</span>
    <span class="tagline">your daily terminal into AI & tech</span>
  </div>
  <div class="header-right">
    <span id="last-update" class="last-update-badge">last updated: --:--</span>
    <button id="theme-toggle" class="header-btn" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
    <button id="subscribe-btn" onclick="alert('Newsletter coming soon! Stay tuned.')">subscribe</button>
    <div style="position:relative">
      <button id="archive-btn" class="header-btn" onclick="toggleArchive()">archive</button>
      <div id="archive-dropdown" class="archive-dropdown" style="display:none">
        <div id="dropdown-dates"></div>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>// archive</h2>
    <div id="date-list"></div>
  </aside>

  <main>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading latest digest...</span>
    </div>
    <div id="error-msg" style="display:none">
      <span style="font-size:2rem">!</span>
      <span id="error-text">Failed to load digest.</span>
    </div>
    <div id="content" style="display:none"></div>
  </main>
</div>

<script>
  let currentDate = null;
  let lastRefreshTime = null;
  let currentlyOpenStory = null;
  const REFRESH_HOURS = [6, 12, 18, 0];

  marked.setOptions({ breaks: true, gfm: true });

  // ── Theme ──────────────────────────────────────────────────────────────────

  function getTheme() {
    return localStorage.getItem('theme') || 'dark';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle');
    btn.innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
  }

  function toggleTheme() {
    const next = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  }

  applyTheme(getTheme());

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  function relativeDay(iso) {
    const et = { timeZone: 'America/New_York' };
    const today = new Date().toLocaleDateString('en-CA', et);
    const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('en-CA', et);
    if (iso === today) return 'Today';
    if (iso === yesterday) return 'Yesterday';
    return '';
  }

  function getCurrentDateET() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
  }

  function slugify(text) {
    return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);
  }

  // ── Archive Dropdown ────────────────────────────────────────────────────────

  function toggleArchive() {
    const dropdown = document.getElementById('archive-dropdown');
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
  }

  function closeArchiveDropdown() {
    document.getElementById('archive-dropdown').style.display = 'none';
  }

  function populateDropdown(dates) {
    const dropdown = document.getElementById('dropdown-dates');
    dropdown.innerHTML = '';
    dates.forEach(d => {
      const item = document.createElement('div');
      item.className = 'date-item' + (d === currentDate ? ' active' : '');
      item.dataset.date = d;
      const rel = relativeDay(d);
      item.innerHTML = `
        <div class="date-label">${formatDate(d)}</div>
        ${rel ? `<div class="date-sub">${rel}</div>` : ''}
      `;
      item.addEventListener('click', () => { loadNews(d); closeArchiveDropdown(); });
      dropdown.appendChild(item);
    });
  }

  // ── Last Updated ────────────────────────────────────────────────────────────

  function updateLastRefreshTime(timestamp = lastRefreshTime) {
    if (!timestamp) {
      document.getElementById('last-update').textContent = 'last updated: --:--';
      return;
    }
    const time = new Date(timestamp).toLocaleTimeString('en-US', {
      timeZone: 'America/New_York',
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById('last-update').textContent = `last updated: ${time}`;
  }

  // ── Auto-Refresh ────────────────────────────────────────────────────────────

  function getNextRefreshTime() {
    const etTime = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const currentHour = etTime.getHours();
    let nextHour = REFRESH_HOURS.find(h => h > currentHour);
    if (!nextHour && nextHour !== 0) {
      nextHour = 6;
      const tomorrow = new Date(etTime);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(6, 0, 0, 0);
      return tomorrow;
    }
    const next = new Date(etTime);
    next.setHours(nextHour, 0, 0, 0);
    return next;
  }

  function scheduleNextRefresh() {
    const msUntilRefresh = getNextRefreshTime().getTime() - new Date().getTime();
    setTimeout(() => {
      const today = getCurrentDateET();
      if (currentDate === today) {
        lastRefreshTime = Date.now();
        updateLastRefreshTime();
        checkForNewStories();
      }
      scheduleNextRefresh();
    }, Math.max(msUntilRefresh, 1000));
  }

  // ── URL Routing ─────────────────────────────────────────────────────────────

  function getDateFromURL() {
    const match = window.location.pathname.match(/(\d{4}-\d{2}-\d{2})/);
    return match ? match[1] : null;
  }

  window.addEventListener('popstate', () => {
    const d = getDateFromURL();
    if (d && d !== currentDate) loadNews(d, false);
  });

  // ── Index & News Loading ────────────────────────────────────────────────────

  async function loadIndex() {
    try {
      const res = await fetch(`news/index.json?t=${Date.now()}`);
      if (!res.ok) throw new Error('index not found');
      const data = await res.json();
      const dates = data.dates || [];

      if (data.lastUpdated) {
        lastRefreshTime = new Date(data.lastUpdated).getTime();
      }

      const list = document.getElementById('date-list');
      list.innerHTML = '';

      if (dates.length === 0) {
        list.innerHTML = '<div style="padding:12px 16px;color:var(--text-muted);font-size:0.82rem">No digests yet.</div>';
        showEmpty();
        return;
      }

      dates.forEach(d => {
        const item = document.createElement('div');
        item.className = 'date-item' + (d === currentDate ? ' active' : '');
        item.dataset.date = d;
        const rel = relativeDay(d);
        item.innerHTML = `
          <div>
            <div class="date-label">${formatDate(d)}</div>
          </div>
          ${rel ? `<div class="date-sub">${rel}</div>` : ''}
        `;
        item.addEventListener('click', () => loadNews(d));
        list.appendChild(item);
      });

      populateDropdown(dates);
      updateLastRefreshTime();

      // Route: check URL first, then load latest
      const urlDate = getDateFromURL();
      if (!currentDate) {
        if (urlDate && dates.includes(urlDate)) {
          loadNews(urlDate, false);
        } else {
          loadNews(dates[0]);
        }
      }
    } catch (e) {
      showError('Could not load news index. Has the first digest been generated yet?');
    }
  }

  async function loadNews(dateStr, pushState = true) {
    currentDate = dateStr;

    // Update URL
    if (pushState) {
      history.pushState({}, '', '/' + dateStr);
    }

    // Update page title
    document.title = `The Bash — ${formatDate(dateStr)}`;

    // Update sidebar active state
    document.querySelectorAll('.date-item').forEach(el => {
      el.classList.toggle('active', el.dataset.date === dateStr);
    });

    updateLastRefreshTime();

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    try {
      const res = await fetch(`news/${dateStr}.md?t=${Date.now()}`);
      if (!res.ok) throw new Error('not found');
      const md = await res.text();
      const html = marked.parse(md);

      const contentEl = document.getElementById('content');
      contentEl.innerHTML = html;

      // Add reading time
      const wordCount = md.split(/\s+/).length;
      const readMin = Math.max(1, Math.round(wordCount / 225));
      const readingEl = document.createElement('div');
      readingEl.className = 'reading-time';
      readingEl.textContent = `~${readMin} min read`;
      const firstH1 = contentEl.querySelector('h1');
      if (firstH1 && firstH1.nextElementSibling) {
        firstH1.nextElementSibling.after(readingEl);
      }

      postProcessContent(contentEl);
      contentEl.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      currentlyOpenStory = null;

      // Start auto-refresh if viewing today
      if (dateStr === getCurrentDateET()) {
        scheduleNextRefresh();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      showError(`Could not load digest for ${formatDate(dateStr)}.`);
    }
  }

  function showEmpty() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">&gt;_</div>
        <h3>No digests yet</h3>
        <p>Run <code>python generate_news.py</code> to create the first digest.</p>
      </div>
    `;
    document.getElementById('content').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').style.display = 'flex';
  }

  // ── Auto-Refresh Check ──────────────────────────────────────────────────────

  async function checkForNewStories() {
    try {
      const today = getCurrentDateET();
      const res = await fetch(`news/${today}.md?t=${Date.now()}`);
      if (!res.ok) return;

      const md = await res.text();
      const html = marked.parse(md);
      const tempContainer = document.createElement('div');
      tempContainer.innerHTML = html;
      postProcessContent(tempContainer);

      const currentContent = document.getElementById('content');
      const newStoryCount = tempContainer.children.length - currentContent.children.length;

      if (newStoryCount > 0) {
        const newStories = Array.from(tempContainer.children).slice(currentContent.children.length);
        const timestamp = new Date().toLocaleTimeString('en-US', {
          timeZone: 'America/New_York',
          hour: '2-digit',
          minute: '2-digit'
        });
        newStories.forEach(story => {
          if (story.tagName === 'H3') {
            const timeLabel = document.createElement('span');
            timeLabel.style.cssText = 'font-size:0.7rem;color:var(--text-muted);margin-left:8px;';
            timeLabel.textContent = `(${timestamp})`;
            story.appendChild(timeLabel);
          }
          currentContent.appendChild(story.cloneNode(true));
        });
      }
    } catch (e) {
      console.log('Auto-refresh check failed:', e);
    }
  }

  // ── Post-processing ─────────────────────────────────────────────────────────

  function postProcessContent(container) {
    makeStoriesCollapsible(container);
  }

  function makeStoriesCollapsible(container) {
    const nodes = Array.from(container.children);
    const groups = [];
    let cur = null;

    for (const node of nodes) {
      const tag = node.tagName;
      if (tag === 'H3') {
        cur = { heading: node, body: [] };
        groups.push(cur);
      } else if (tag === 'H2' || tag === 'H1') {
        cur = null;
      } else if (cur) {
        cur.body.push(node);
      }
    }

    for (const { heading, body } of groups) {
      if (!body.length) continue;

      // Detect [PAYWALL]
      const rawText = heading.textContent;
      const hasPaywall = rawText.includes('[PAYWALL]');
      if (hasPaywall) {
        heading.childNodes.forEach(n => {
          if (n.nodeType === 3) n.textContent = n.textContent.replace(/\s*\[PAYWALL\]/g, '');
        });
        const badge = document.createElement('span');
        badge.className = 'paywall-badge';
        badge.textContent = 'PAYWALL';
        const link = heading.querySelector('a');
        if (link) link.after(badge);
        else heading.appendChild(badge);
      }

      // Wrap body in collapsible div
      const wrapper = document.createElement('div');
      wrapper.className = 'story-body';
      body[0].parentNode.insertBefore(wrapper, body[0]);
      body.forEach(n => wrapper.appendChild(n));

      wrapper.innerHTML = wrapper.innerHTML.replace(
        /\[PAYWALL\]/g,
        '<span class="paywall-badge">PAYWALL</span>'
      );

      // Add share buttons
      const storySlug = slugify(heading.textContent);
      const storyUrl = `${window.location.origin}/${currentDate}#${storySlug}`;
      const shareRow = document.createElement('div');
      shareRow.className = 'share-row';
      shareRow.innerHTML = `
        <button class="share-btn" onclick="window.open('https://twitter.com/intent/tweet?text=${encodeURIComponent(heading.textContent)}&url=${encodeURIComponent(storyUrl)}','_blank','width=550,height=420')">share on X</button>
        <button class="share-btn" onclick="navigator.clipboard.writeText('${storyUrl}');this.textContent='copied!'">copy link</button>
      `;
      wrapper.appendChild(shareRow);

      // Wire up toggle
      heading.classList.add('story-toggle');
      heading.id = storySlug;
      const chevron = document.createElement('span');
      chevron.className = 'story-chevron';
      chevron.textContent = '\u25B8';
      heading.insertBefore(chevron, heading.firstChild);

      heading.addEventListener('click', () => {
        if (currentlyOpenStory && currentlyOpenStory !== heading) {
          const prevWrapper = currentlyOpenStory.nextElementSibling;
          if (prevWrapper && prevWrapper.classList.contains('story-body')) {
            prevWrapper.classList.remove('open');
            const prevChevron = currentlyOpenStory.querySelector('.story-chevron');
            if (prevChevron) prevChevron.textContent = '\u25B8';
          }
        }
        const open = wrapper.classList.toggle('open');
        chevron.textContent = open ? '\u25BE' : '\u25B8';
        currentlyOpenStory = open ? heading : null;
      });
    }
  }

  // ── Global Events ───────────────────────────────────────────────────────────

  document.addEventListener('click', (e) => {
    const archiveBtn = document.getElementById('archive-btn');
    const dropdown = document.getElementById('archive-dropdown');
    if (!archiveBtn.contains(e.target) && !dropdown.contains(e.target)) {
      closeArchiveDropdown();
    }
  });

  loadIndex();
</script>
</body>
</html>
