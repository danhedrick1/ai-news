<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bash — AI News for Builders</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --sidebar-bg: #161b22;
      --card-bg: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --tag-bg: #1f3a5f;
      --tag-text: #79b8ff;
      --header-height: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .logo span { color: var(--accent); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #archive-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #archive-btn:hover { border-color: var(--accent); color: var(--accent); }

    .last-update-badge {
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .archive-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 220px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .archive-dropdown .date-item {
      padding: 10px 16px;
      border-left: none;
      border-radius: 0;
    }
    .archive-dropdown .date-item:hover {
      background: rgba(88,166,255,0.05);
    }
    .archive-dropdown .date-item.active {
      background: rgba(88,166,255,0.1);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .archive-dropdown .date-item .date-sub {
      display: block;
      font-size: 0.65rem;
      margin-left: 0;
      margin-top: 2px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
    }

    /* ── SIDEBAR ── */
    aside {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto;
    }

    aside h2 {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .date-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .date-item:hover { background: rgba(88,166,255,0.05); }
    .date-item.active {
      background: rgba(88,166,255,0.1);
      border-left-color: var(--accent);
    }
    .date-item .date-label {
      font-size: 0.85rem;
      color: var(--text);
    }
    .date-item .date-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .date-item.active .date-label { color: var(--accent); }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      padding: 36px 48px;
      max-width: 860px;
    }

    #loading, #error-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 300px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MARKDOWN STYLES ── */
    #content h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    #content h1 + p em {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: normal;
    }

    #content h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #content h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }

    #content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin: 24px 0 10px;
    }

    #content p {
      color: #cdd9e5;
      line-height: 1.75;
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    #content ul, #content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }
    #content li {
      color: #cdd9e5;
      line-height: 1.7;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    #content li::marker { color: var(--accent); }

    #content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(88,166,255,0.3);
      transition: border-color 0.15s;
    }
    #content a:hover { border-color: var(--accent); }

    #content strong { color: var(--text); font-weight: 600; }
    #content em { color: var(--text-muted); }

    #content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: rgba(88,166,255,0.05);
      border-radius: 0 6px 6px 0;
      margin: 16px 0;
    }
    #content blockquote p { margin: 0; color: var(--text-muted); font-style: italic; }

    #content code {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.85em;
      color: #f0883e;
    }

    #content pre {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    #content pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e6edf3;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── DATE HEADER ── */
    .news-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .news-meta .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* ── COLLAPSIBLE STORIES ── */
    #content h3.story-toggle {
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    #content h3.story-toggle:hover { color: var(--accent); }
    #content h3.story-toggle:hover .story-chevron { color: var(--accent); }

    .story-chevron {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-right: 6px;
      transition: color 0.15s;
    }

    .story-body {
      display: none;
      padding: 6px 0 16px 22px;
      border-left: 2px solid var(--border);
      margin: 2px 0 8px 5px;
    }
    .story-body.open {
      display: block;
      animation: storyFadeIn 0.15s ease;
    }
    @keyframes storyFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── PAYWALL BADGE ── */
    .paywall-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      color: #d29922;
      background: rgba(210,153,34,0.1);
      border: 1px solid rgba(210,153,34,0.35);
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* ── CLASSIFICATION BADGES ── */
    .classification-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .badge-breakthrough { color: #f85149; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); }
    .badge-tool { color: #58a6ff; background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); }
    .badge-funding { color: #3fb950; background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); }
    .badge-controversy { color: #f0883e; background: rgba(240,136,62,0.1); border: 1px solid rgba(240,136,62,0.3); }
    .badge-dev_insight { color: #a371f7; background: rgba(163,113,247,0.1); border: 1px solid rgba(163,113,247,0.3); }
    .badge-research { color: #79c0ff; background: rgba(121,192,255,0.1); border: 1px solid rgba(121,192,255,0.3); }
    .badge-policy { color: #d2a8ff; background: rgba(210,168,255,0.1); border: 1px solid rgba(210,168,255,0.3); }

    /* ── DEV TAKE ── */
    #content p strong:first-child {
      /* handled by markdown */
    }
    .dev-take {
      background: rgba(88,166,255,0.05);
      border-left: 3px solid var(--accent);
      padding: 8px 14px;
      margin: 10px 0 14px;
      border-radius: 0 6px 6px 0;
      font-size: 0.9rem;
      color: #cdd9e5;
    }
    .dev-take strong {
      color: var(--accent) !important;
    }

    /* ── FORMAT TABS ── */
    .format-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .format-tab {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .format-tab:hover { border-color: var(--accent); color: var(--accent); }
    .format-tab.active {
      background: rgba(88,166,255,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }
    .format-content { display: none; }
    .format-content.active { display: block; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      aside { display: none; }
      main { padding: 24px 20px; }
      #content h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot"></div>
    The<span>Bash</span>
  </div>
  <div class="header-right">
    <div id="last-update" class="last-update-badge">Last updated: --:--</div>
    <div style="position:relative">
      <button id="archive-btn" onclick="toggleArchive()">📅 Archive</button>
      <div id="archive-dropdown" class="archive-dropdown" style="display:none">
        <div id="dropdown-dates"></div>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>Archive</h2>
    <div id="date-list"></div>
  </aside>

  <main>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading latest news…</span>
    </div>
    <div id="error-msg" style="display:none">
      <span style="font-size:2rem">⚠️</span>
      <span id="error-text">Failed to load news.</span>
    </div>
    <div id="format-tabs" class="format-tabs" style="display:none">
      <button class="format-tab active" data-format="website" onclick="switchFormat('website')">Website</button>
      <button class="format-tab" data-format="twitter" onclick="switchFormat('twitter')">Twitter/X Thread</button>
      <button class="format-tab" data-format="newsletter" onclick="switchFormat('newsletter')">Newsletter</button>
    </div>
    <div id="content" class="format-content active" style="display:none"></div>
    <div id="twitter-content" class="format-content" style="display:none"></div>
    <div id="newsletter-content" class="format-content" style="display:none"></div>
  </main>
</div>

<script>
  let currentDate = null;
  let lastRefreshTime = null; // Time when last scheduled refresh check ran
  let currentlyOpenStory = null;
  const REFRESH_HOURS = [6, 12, 18, 0]; // 6 AM, 12 PM, 6 PM, 12 AM

  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  }

  function relativeDay(iso) {
    const et = { timeZone: 'America/New_York' };
    const today = new Date().toLocaleDateString('en-CA', et);
    const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('en-CA', et);
    if (iso === today) return 'Today';
    if (iso === yesterday) return 'Yesterday';
    return '';
  }

  function getCurrentDateET() {
    const et = { timeZone: 'America/New_York' };
    return new Date().toLocaleDateString('en-CA', et);
  }

  function toggleArchive() {
    const dropdown = document.getElementById('archive-dropdown');
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
  }

  function closeArchiveDropdown() {
    document.getElementById('archive-dropdown').style.display = 'none';
  }

  function populateDropdown(dates) {
    const dropdown = document.getElementById('dropdown-dates');
    dropdown.innerHTML = '';

    dates.forEach(d => {
      const item = document.createElement('div');
      item.className = 'date-item' + (d === currentDate ? ' active' : '');
      item.dataset.date = d;
      const rel = relativeDay(d);
      item.innerHTML = `
        <div class="date-label">${formatDate(d)}</div>
        ${rel ? `<div class="date-sub">${rel}</div>` : ''}
      `;
      item.addEventListener('click', () => {
        loadNews(d);
        closeArchiveDropdown();
      });
      dropdown.appendChild(item);
    });
  }

  function updateLastRefreshTime(timestamp = lastRefreshTime) {
    if (!timestamp) {
      document.getElementById('last-update').textContent = 'Last updated: --:--';
      return;
    }
    const et = { timeZone: 'America/New_York' };
    const time = new Date(timestamp).toLocaleTimeString('en-US', {
      ...et,
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById('last-update').textContent = `Last updated: ${time}`;
  }

  function getNextRefreshTime() {
    const now = new Date();
    const et = { timeZone: 'America/New_York' };
    const etTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const currentHour = etTime.getHours();

    // Find next refresh hour
    let nextHour = REFRESH_HOURS.find(h => h > currentHour);
    if (!nextHour && nextHour !== 0) {
      // No more refreshes today, next is 6 AM tomorrow
      nextHour = 6;
      const tomorrow = new Date(etTime);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(6, 0, 0, 0);
      return tomorrow;
    }

    const next = new Date(etTime);
    next.setHours(nextHour, 0, 0, 0);
    return next;
  }

  function scheduleNextRefresh() {
    const nextRefresh = getNextRefreshTime();
    const now = new Date();
    const msUntilRefresh = nextRefresh.getTime() - now.getTime();

    setTimeout(() => {
      const today = getCurrentDateET();
      if (currentDate === today) {
        lastRefreshTime = Date.now();
        updateLastRefreshTime();
        checkForNewStories();
      }
      scheduleNextRefresh(); // Schedule the next one
    }, Math.max(msUntilRefresh, 1000)); // At least 1 second to avoid issues
  }

  async function loadIndex() {
    try {
      const res = await fetch(`news/index.json?t=${Date.now()}`);
      if (!res.ok) throw new Error('index not found');
      const data = await res.json();
      const dates = data.dates || [];

      // Load the lastUpdated timestamp from index.json
      if (data.lastUpdated) {
        lastRefreshTime = new Date(data.lastUpdated).getTime();
      }

      const list = document.getElementById('date-list');
      list.innerHTML = '';

      if (dates.length === 0) {
        list.innerHTML = '<div style="padding:12px 16px;color:var(--text-muted);font-size:0.82rem">No issues yet.</div>';
        showEmpty();
        return;
      }

      dates.forEach(d => {
        const item = document.createElement('div');
        item.className = 'date-item' + (d === currentDate ? ' active' : '');
        item.dataset.date = d;
        const rel = relativeDay(d);
        item.innerHTML = `
          <div>
            <div class="date-label">${formatDate(d)}</div>
          </div>
          ${rel ? `<div class="date-sub">${rel}</div>` : ''}
        `;
        item.addEventListener('click', () => loadNews(d));
        list.appendChild(item);
      });

      // Also populate the dropdown
      populateDropdown(dates);
      updateLastRefreshTime();

      if (!currentDate && dates.length > 0) {
        loadNews(dates[0]);
      }
    } catch (e) {
      showError('Could not load news index. Has the first issue been generated yet?');
    }
  }

  async function loadNews(dateStr) {
    currentDate = dateStr;

    // Update sidebar active state
    document.querySelectorAll('.date-item').forEach(el => {
      el.classList.toggle('active', el.dataset.date === dateStr);
    });

    updateLastRefreshTime();

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('format-tabs').style.display = 'none';
    // Reset alternate formats
    const twitterEl = document.getElementById('twitter-content');
    const newsletterEl = document.getElementById('newsletter-content');
    twitterEl.style.display = 'none';
    twitterEl.innerHTML = '';
    twitterEl.dataset.loaded = '';
    newsletterEl.style.display = 'none';
    newsletterEl.innerHTML = '';
    newsletterEl.dataset.loaded = '';

    try {
      const res = await fetch(`news/${dateStr}.md?t=${Date.now()}`);
      if (!res.ok) throw new Error('not found');
      const md = await res.text();
      const html = marked.parse(md);

      const contentEl = document.getElementById('content');
      contentEl.innerHTML = html;
      postProcessContent(contentEl);
      contentEl.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('format-tabs').style.display = 'flex';
      // Reset to website tab
      switchFormat('website');
      currentlyOpenStory = null;

      // Start auto-refresh if viewing today
      const today = getCurrentDateET();
      if (dateStr === today) {
        startAutoRefresh();
      }

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      showError(`Could not load news for ${formatDate(dateStr)}.`);
    }
  }

  function showEmpty() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">📰</div>
        <h3>No issues yet</h3>
        <p>Run <code>python generate_news.py</code> to create the first issue of The Bash.</p>
      </div>
    `;
    document.getElementById('content').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').style.display = 'flex';
  }

  // ── Post-processing: collapsible stories + paywall badges ──────────────────

  function startAutoRefresh() {
    // Schedule refreshes at 6 AM, 12 PM, 6 PM, 12 AM
    scheduleNextRefresh();
  }

  async function checkForNewStories() {
    try {
      const today = getCurrentDateET();
      const res = await fetch(`news/${today}.md?t=${Date.now()}`);
      if (!res.ok) return;

      const md = await res.text();
      const html = marked.parse(md);
      const tempContainer = document.createElement('div');
      tempContainer.innerHTML = html;
      postProcessContent(tempContainer);

      const currentContent = document.getElementById('content');
      const newStoryCount = tempContainer.children.length - currentContent.children.length;

      if (newStoryCount > 0) {
        // Add new stories with timestamps
        const newStories = Array.from(tempContainer.children).slice(currentContent.children.length);
        const timestamp = new Date().toLocaleTimeString('en-US', {
          timeZone: 'America/New_York',
          hour: '2-digit',
          minute: '2-digit'
        });

        newStories.forEach(story => {
          if (story.tagName === 'H3') {
            const timeLabel = document.createElement('span');
            timeLabel.style.cssText = 'font-size:0.7rem;color:var(--text-muted);margin-left:8px;';
            timeLabel.textContent = `(${timestamp})`;
            story.appendChild(timeLabel);
          }
          currentContent.appendChild(story.cloneNode(true));
        });
      }
    } catch (e) {
      console.log('Auto-refresh check failed:', e);
    }
  }

  function postProcessContent(container) {
    makeStoriesCollapsible(container);
    styleClassificationBadges(container);
    styleDevTakes(container);
  }

  function styleClassificationBadges(container) {
    // Convert *[classification]* patterns in <em> tags to styled badges
    const classifications = ['breakthrough','tool','funding','controversy','dev_insight','research','policy'];
    container.querySelectorAll('em').forEach(em => {
      const text = em.textContent.trim().replace(/^\[|\]$/g, '');
      if (classifications.includes(text)) {
        const badge = document.createElement('span');
        badge.className = `classification-badge badge-${text}`;
        badge.textContent = text;
        em.replaceWith(badge);
      }
    });
  }

  function styleDevTakes(container) {
    // Find paragraphs starting with Dev Take emoji and wrap them
    container.querySelectorAll('p').forEach(p => {
      const text = p.textContent;
      if (text.includes('Dev Take:') || text.includes('🔧')) {
        p.classList.add('dev-take');
      }
    });
  }

  function makeStoriesCollapsible(container) {
    const nodes = Array.from(container.children);
    const groups = [];
    let cur = null;

    for (const node of nodes) {
      const tag = node.tagName;
      if (tag === 'H3') {
        cur = { heading: node, body: [] };
        groups.push(cur);
      } else if (tag === 'H2' || tag === 'H1') {
        cur = null;
      } else if (cur) {
        cur.body.push(node);
      }
    }

    for (const { heading, body } of groups) {
      if (!body.length) continue;

      // Detect [PAYWALL] in heading text, remove it, add badge
      const rawText = heading.textContent;
      const hasPaywall = rawText.includes('[PAYWALL]');
      if (hasPaywall) {
        heading.childNodes.forEach(n => {
          if (n.nodeType === 3) n.textContent = n.textContent.replace(/\s*\[PAYWALL\]/g, '');
        });
        const badge = document.createElement('span');
        badge.className = 'paywall-badge';
        badge.textContent = '⚠ Paywall';
        const link = heading.querySelector('a');
        if (link) link.after(badge);
        else heading.appendChild(badge);
      }

      // Wrap body in collapsible div
      const wrapper = document.createElement('div');
      wrapper.className = 'story-body';
      body[0].parentNode.insertBefore(wrapper, body[0]);
      body.forEach(n => wrapper.appendChild(n));

      // Replace any remaining [PAYWALL] markers inside the body
      wrapper.innerHTML = wrapper.innerHTML.replace(
        /\[PAYWALL\]/g,
        '<span class="paywall-badge">⚠ Paywall</span>'
      );

      // Wire up the toggle
      heading.classList.add('story-toggle');
      const chevron = document.createElement('span');
      chevron.className = 'story-chevron';
      chevron.textContent = '▸';
      heading.insertBefore(chevron, heading.firstChild);

      heading.addEventListener('click', () => {
        // Auto-collapse previous story
        if (currentlyOpenStory && currentlyOpenStory !== heading) {
          const prevWrapper = currentlyOpenStory.nextElementSibling;
          if (prevWrapper && prevWrapper.classList.contains('story-body')) {
            prevWrapper.classList.remove('open');
            const prevChevron = currentlyOpenStory.querySelector('.story-chevron');
            if (prevChevron) prevChevron.textContent = '▸';
          }
        }

        // Toggle current story
        const open = wrapper.classList.toggle('open');
        chevron.textContent = open ? '▾' : '▸';
        currentlyOpenStory = open ? heading : null;
      });
    }
  }

  function switchFormat(format) {
    document.querySelectorAll('.format-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.format === format);
    });
    document.querySelectorAll('.format-content').forEach(c => {
      c.classList.remove('active');
      c.style.display = 'none';
    });
    const target = format === 'website' ? 'content'
                 : format === 'twitter' ? 'twitter-content'
                 : 'newsletter-content';
    const el = document.getElementById(target);
    el.classList.add('active');
    el.style.display = 'block';

    // Load alternate formats on demand
    if (format === 'twitter' && !el.dataset.loaded && currentDate) {
      loadAlternateFormat(currentDate, 'twitter');
    }
    if (format === 'newsletter' && !el.dataset.loaded && currentDate) {
      loadAlternateFormat(currentDate, 'newsletter');
    }
  }

  async function loadAlternateFormat(dateStr, format) {
    const suffix = format === 'twitter' ? '-twitter' : '-newsletter';
    const targetId = format === 'twitter' ? 'twitter-content' : 'newsletter-content';
    const el = document.getElementById(targetId);
    try {
      const res = await fetch(`news/${dateStr}${suffix}.md?t=${Date.now()}`);
      if (!res.ok) throw new Error('not found');
      const md = await res.text();
      el.innerHTML = marked.parse(md);
      el.dataset.loaded = 'true';
    } catch (e) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><h3>Not available</h3><p>This format has not been generated for this date.</p></div>';
    }
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    const archiveBtn = document.getElementById('archive-btn');
    const dropdown = document.getElementById('archive-dropdown');
    if (!archiveBtn.contains(e.target) && !dropdown.contains(e.target)) {
      closeArchiveDropdown();
    }
  });

  loadIndex();
</script>
</body>
